[tool.ruff]
target-version = "py312"
line-length = 100
src = ["apps/api/src", "apps/worker/src"]

[tool.ruff.lint]
select = ["B", "E", "F", "I", "RUF", "UP"]

[tool.mypy]
python_version = "3.12"
strict = true
warn_unreachable = true
mypy_path = ["apps/api/src", "apps/worker/src"]

[tool.pytest.ini_options]
addopts = "-q"
testpaths = ["apps/api/tests", "apps/worker/tests"]
