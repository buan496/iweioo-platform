name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secrets:
    name: Secret Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  quality:
    name: Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/pyproject.toml

      - name: Install dependencies
        run: npm ci

      - name: Install Python services
        run: python -m pip install -e "apps/api[dev]" -e "apps/worker"

      - name: Validate identity configuration
        run: npm run identity:validate

      - name: Lint
        run: npm run lint

      - name: Lint Python
        run: python -m ruff check apps/api apps/worker

      - name: Typecheck
        run: npm run typecheck

      - name: Typecheck Python
        run: python -m mypy apps/api/src apps/worker/src

      - name: Test
        run: npm test

      - name: Test Python
        run: python -m pytest

      - name: Verify generated SDK
        run: |
          npm run generate:sdk
          git diff --exit-code -- packages/sdk/src/generated/platform-api.ts

      - name: Build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
        run: npm run build

  identity-smoke:
    name: Identity Smoke
    runs-on: ubuntu-latest
    env:
      IDENTITY_COMPOSE_FILE: deploy/compose/identity.compose.yml
      KEYCLOAK_DB_PASSWORD: not-a-secret
      KC_BOOTSTRAP_ADMIN_PASSWORD: not-a-secret
      IDENTITY_REDIS_PASSWORD: not-a-secret

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Start local identity profile
        run: docker compose --file "$IDENTITY_COMPOSE_FILE" up --detach --quiet-pull

      - name: Verify realm discovery and test mail
        run: |
          for attempt in $(seq 1 60); do
            if curl --fail --silent \
              http://127.0.0.1:8080/realms/iweioo/.well-known/openid-configuration \
              --output discovery.json; then
              break
            fi
            if [ "$attempt" -eq 60 ]; then
              echo "Keycloak discovery did not become ready within 120 seconds" >&2
              exit 1
            fi
            sleep 2
          done
          jq --exit-status \
            '.issuer == "http://localhost:8080/realms/iweioo" and (.code_challenge_methods_supported | index("S256") != null)' \
            discovery.json
          curl --fail --silent --show-error http://127.0.0.1:8025/api/v1/info > /dev/null
          docker compose --file "$IDENTITY_COMPOSE_FILE" exec -T identity-session \
            sh -ec 'REDISCLI_AUTH="$REDIS_PASSWORD" redis-cli ping' | grep --fixed-strings --line-regexp PONG

      - name: Show identity logs on failure
        if: failure()
        run: docker compose --file "$IDENTITY_COMPOSE_FILE" logs --no-color

      - name: Stop local identity profile
        if: always()
        run: docker compose --file "$IDENTITY_COMPOSE_FILE" down --volumes --remove-orphans
