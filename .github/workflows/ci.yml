name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secrets:
    name: Secret Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  quality:
    name: Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/pyproject.toml

      - name: Install dependencies
        run: npm ci

      - name: Install Python services
        run: python -m pip install -e "apps/api[dev]" -e "apps/worker"

      - name: Lint
        run: npm run lint

      - name: Lint Python
        run: python -m ruff check apps/api apps/worker

      - name: Typecheck
        run: npm run typecheck

      - name: Typecheck Python
        run: python -m mypy apps/api/src apps/worker/src

      - name: Test
        run: npm test

      - name: Test Python
        run: python -m pytest

      - name: Verify generated SDK
        run: |
          npm run generate:sdk
          git diff --exit-code -- packages/sdk/src/generated/platform-api.ts

      - name: Build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
        run: npm run build
